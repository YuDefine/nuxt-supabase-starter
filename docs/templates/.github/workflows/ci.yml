# CI Workflow Template
# Copy to .github/workflows/ci.yml and customize secrets
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - run: vp install

      - name: Format check
        run: vp run format:check

      - name: Lint
        run: vp run lint

      - name: Typecheck
        run: vp run typecheck

      - name: Run tests
        run: vp run test
