name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Validate starter scaffold
        run: pnpm validate:starter

      - name: Check (lint + fmt + test)
        run: vp check

      - name: Typecheck
        run: pnpm typecheck

  e2e:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests (smoke only)
        run: pnpm test:e2e --project=chromium-no-auth

  database:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to remote
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Verify table owners
        run: |
          # 確認所有 public schema 的 table 都由 postgres 角色擁有
          # 如果有 supabase_admin 擁有的 table，代表有人用 MCP DDL 建立，需要修正
          RESULT=$(supabase db execute --linked \
            "SELECT tablename, tableowner FROM pg_tables WHERE schemaname = 'public' AND tableowner != 'postgres';" \
            2>&1)
          if echo "$RESULT" | grep -q '|'; then
            echo "::error::Found tables not owned by postgres role:"
            echo "$RESULT"
            exit 1
          fi
          echo "All tables are owned by postgres role."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Lint database
        run: supabase db lint --linked --level warning
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
