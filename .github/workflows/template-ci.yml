name: Template CI

on:
  pull_request:
    paths:
      - 'template/app/**'
      - 'template/server/**'
      - 'template/shared/**'
      - 'template/layers/**'
      - 'template/supabase/**'
      - 'template/scripts/**'
      - 'template/nuxt.config.ts'
      - 'template/package.json'
      - 'template/pnpm-lock.yaml'
      - 'template/tsconfig*.json'
      - 'template/.claude/hub.json'
      - '.github/workflows/template-ci.yml'
  push:
    branches: [main]
    paths:
      - 'template/app/**'
      - 'template/server/**'
      - 'template/shared/**'
      - 'template/layers/**'
      - 'template/supabase/**'
      - 'template/scripts/**'
      - 'template/nuxt.config.ts'
      - 'template/package.json'
      - 'template/pnpm-lock.yaml'
      - 'template/tsconfig*.json'
      - 'template/.claude/hub.json'
      - '.github/workflows/template-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: template-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format / Lint / Typecheck / Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: template
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Setup Vite+ (vp)
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Format check
        run: vp fmt --check

      - name: Lint
        run: vp lint

      - name: Typecheck
        run: vp run typecheck

      - name: Unit tests
        run: vp test --coverage

      - name: UX drift audit
        run: vp run audit:ux-drift

      # NOTE: Spectra roadmap drift check 在 CI 環境經常 false positive
      # （spectra CLI 不在 ubuntu PATH、.spectra/spectra.db 不存在等），
      # 暫時不在 CI 擋；本地 hook 仍會跑 sync 維持 ROADMAP 鮮度。
      # Follow-up: 讓 sync --check 在 spectra CLI unavailable 時對齊 disk
      # parked block（已有 skip-replace 機制，但其他結構性差異待查），
      # 之後再恢復這個 gate。
