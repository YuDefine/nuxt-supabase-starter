name: Template E2E

on:
  workflow_run:
    workflows: ['Template CI']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: template-e2e-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # 30 min cap：@nuxt/test-utils 在 dev: false 下每個 spec 都重新 build Nuxt（~30s/spec），
    # 23 specs × ~30s = 11+ min build 開銷，加實際 test 跑不完原 15 min。
    # 治本作法（共用 Nuxt instance）見 TD-001。
    timeout-minutes: 30
    defaults:
      run:
        working-directory: template
    env:
      HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      # E2E 跑 node-server preset，避開 cloudflare-module-legacy 的 cloudflare:sockets external。
      # 提到 job 層讓所有 step 自動繼承，避免單獨 step 漏設 drift。
      NITRO_PRESET: node-server
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Setup Vite+ (vp)
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        id: supabase
        run: |
          supabase start
          {
            echo "anon_key=$(supabase status -o env | grep '^ANON_KEY=' | cut -d= -f2- | tr -d '\"')"
            echo "service_role_key=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2- | tr -d '\"')"
          } >> "$GITHUB_OUTPUT"

      - name: Seed database
        run: supabase db reset

      - name: Build Nuxt
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_KEY: ${{ steps.supabase.outputs.anon_key }}
        run: vp run build

      - name: Run E2E tests
        env:
          NUXT_SESSION_PASSWORD: e2e-ci-session-password-at-least-32-chars
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SECRET_KEY: ${{ steps.supabase.outputs.service_role_key }}
        run: vp run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: template-playwright-report
          path: |
            template/playwright-report/
            template/test-results/
          retention-days: 14

      - name: Cleanup Supabase
        if: always()
        run: supabase stop
