## 拍前 Emptiness Preflight

**核心命題**：對空頁面硬拍 = 無效 review。每次 `new_tab + wait_for_load` 之後、`capture_screenshot` 之前，**MUST** 跑 emptiness heuristic 判斷頁面是否疑似空狀態。

### Heuristic 偵測

```bash
browser-harness -c '
import json
result = js(\"""
  const text = document.body.innerText || "";
  const empty_signals = ["沒有資料", "尚無", "暫無", "目前還沒有", "沒有項目", "No data", "No results", "Empty", "Nothing here", "No items"];
  const list_rows = document.querySelectorAll("tbody tr, [role=list] [role=listitem], [role=table] [role=row], ul > li, ol > li").length;
  const main_el = document.querySelector("main, [role=main], .content, #app");
  const main_text_len = (main_el ? main_el.innerText : text).length;
  return JSON.stringify({
    has_empty_signal: empty_signals.some(s => text.includes(s)),
    list_rows: list_rows,
    main_text_len: main_text_len,
  });
\""")
print(result)
'
```

### 判定規則

`has_empty_signal=true` **或** （`list_rows < 2` **且** `main_text_len < 200`）→ **疑似空狀態**

命中時：

1. `wait` 2 秒（避開 SPA loading false positive）+ retry 一次
2. 第二次仍命中 → **NEVER** 直接拍，進入「空資料解決流程」

未命中 → 繼續正常截圖流程。

### 例外：刻意驗證的 empty / loading / error / no-data state

呼叫端的 review target 描述若**明示**目的是驗證空狀態（例如「empty state」「no data」「first-time」「unauthorized」「error state」「loading state」「skeleton」「無資料」「未登入」「沒權限」等關鍵字），**MUST** bypass 上面的判定規則直接拍——這是 review 要的目標，不是「資料缺失」。bypass 不寫入 seed / 不修 fixtures。

## 空資料解決流程

依 host 分支處理（用 `page_info()["url"]` 取 host）：

### a) dev (host 含 `localhost` / `127.0.0.1` / `dev`)

**Step 1 — 反查 tasks.md 是否有 Fixtures Plan**：

若主 session 有提供 `<change-name>`：

```bash
grep -E '^## .*Fixtures' "openspec/changes/<change-name>/tasks.md" 2>/dev/null
```

- **有 Fixtures Plan section** → 停下回報主 session：「Fixtures Plan 已在 `tasks.md` 但本機 DB 似乎未跑 seed / 或 fixtures 量不足。請回 apply 階段執行 fixtures task 後再 retry 截圖。」**NEVER** 自己補（避免雙重 source of truth）
- **無 Fixtures Plan** 或 ad-hoc 截圖（無 change-name）→ 進入 Step 2

**Step 2 — 偵測 seed 慣例位置**（依序試）：

```bash
for f in supabase/seed.sql db/seed.sql prisma/seed.ts drizzle/seed.ts; do
  [ -f "$f" ] && echo "$f" && break
done
```

**Step 3 — 偵測 reset / seed 命令**（讀 `package.json` `scripts`）：

```bash
node -e 'const s=require("./package.json").scripts||{}; for (const k of ["db:reset","db:seed","supabase:reset","prisma:seed"]) if (s[k]) { console.log(k); break }'
```

**Step 3.5 — Multi-client backend gate（重要）**：

`pnpm db:reset` 在 multi-client repo（同一 codebase 服務多個 client，如 perno 的 `bigbyte` / `shared`）通常**只指向預設 client 的 backend**，跑下去會打到錯的 DB。截圖 host 與 db:reset target 不一致時**MUST** 停下回報，不要硬跑：

```bash
# 偵測 multi-client：package.json 有 dev:<client> 多項時視為 multi-client
node -e '
const s=require("./package.json").scripts||{};
const clientScripts=Object.keys(s).filter(k=>/^dev:[a-z-]+$/.test(k));
console.log(clientScripts.length>=2 ? "multi-client" : "single-client");
console.log("clients:", clientScripts.map(k=>k.replace(/^dev:/,"")).join(","));
'
```

判斷規則：

- **single-client repo** → 安全，直接跑 reset 命令
- **multi-client repo + 截圖 host port 對應 default client**（通常 `dev:bigbyte` / `dev` alias / `dev:default`）→ 安全，直接跑
- **multi-client repo + host port 對應非 default client**（如 perno `:3045` 是 shared，`:3040` 是 bigbyte default）→ **MUST** 停下回報主 session：「`<URL>` 對應非 default client `<client>`，db:reset 預設指向 BigByte LXC 不會處理 `<client>` backend；請手動補對應 seed 後 retry。」**NEVER** 自動跑

**Step 4 — 補 mock + 跑 reset**（通過 Step 3.5 gate 後）：

- 偵測到 seed 檔 + reset 命令 → 主動補必要 mock 進 seed 檔（依目前頁面所需 entity，最少 happy path 3 筆 + edge case 1 筆），跑 reset 命令，retry 截圖
- review.md **MUST** 加 section「Seed 變動」列：
  - 新增了哪幾行（檔案 + line range）
  - 跑了哪個命令
- 偵測不到 seed 機制 → 停下回報主 session：「找不到 seed 慣例位置（試過 supabase/seed.sql / db/seed.sql / prisma/seed.ts / drizzle/seed.ts），請確認專案 seed 機制再 retry。」

### b) staging (host 含 `staging`)

1. **MUST** 立刻停下回報主 session：「staging 上 `<URL>` 缺資料無法 review，是否授權補 seed？授權後仍走 seed.sql + 正規 migration 流程，**NEVER** 直接寫 staging DB。」
2. 等使用者**明確**授權才繼續
3. 授權後流程同 dev Step 2~4，但目標檔是 staging 對應 seed（依專案慣例，可能是同一份 seed.sql 或獨立 staging-seed.sql — 不確定時詢問主 session）

### c) production / 真實 host

拒絕，回報：「production review 不應遇到空狀態。請改用 dev 環境驗收，或確認是否錯把 production URL 當 review target。」

### 禁止用以下手段補資料

- **NEVER** 改 component 加 fallback 假資料 / placeholder data 來填 UI
- **NEVER** 在 dev 用 ad-hoc UI 操作（手動點按鈕新增）「補滿」資料 — 不持久化、下次 reset DB 又空
- **NEVER** 用 curl / fetch 注入 API call 補資料 — 同樣不持久化
- **NEVER** 在 staging 未授權前寫資料

## 截圖流程

**MUST**：每次截圖前先用 `page_info()` 驗證 URL 確實落在預期 host（`localhost:<port>` / staging / production），**NEVER** 在沒驗證 host 的情況下截圖 — browser-harness 連的是使用者真實 Chrome，可能誤截到使用者其他 tab 切換過去的環境。

對每個截圖目標：

1. **判斷截圖目標** — 根據描述推斷需要截圖的頁面/狀態
   - UI 項目 → 導航到對應頁面
   - 非 UI 項目（`pnpm check`、`console.log`）→ 用 CLI 驗證，標註「非 UI 項目」，跳過後續步驟
2. **跑 Emptiness Preflight**（見上節「拍前 Emptiness Preflight」）
   - 命中疑似空狀態 → 執行「空資料解決流程」，**NEVER** 跳過此步驟硬拍
   - 未命中 → 繼續 Step 3
3. **執行截圖**（依 color mode 設定）：

   **指定單一 mode 時**：

   ```bash
   browser-harness -c '
   target = "http://localhost:<port>/目標路徑"   # 或走 dev-login route
   new_tab(target)
   wait_for_load()
   info = page_info()
   assert "localhost:<port>" in info["url"], f"unexpected host: {info[\\"url\\"]}"
   wait_for_element("text=目標文字", timeout=10) if False else wait_for_load()  # 視需要等
   capture_screenshot("screenshots/<env>/<folder-name>/#<N>-<brief-desc>.png", max_dim=1800)
   '
   ```

   **未指定 mode 時（預設雙模式）**：

   ```bash
   # — Light —
   browser-harness -c '
   target = "http://localhost:<port>/目標路徑"
   new_tab(target)
   wait_for_load()
   info = page_info()
   assert "localhost:<port>" in info["url"], f"unexpected host: {info[\\"url\\"]}"
   js("localStorage.setItem(\\"nuxt-color-mode\\", \\"light\\"); document.documentElement.classList.remove(\\"dark\\"); document.documentElement.classList.add(\\"light\\"); document.documentElement.style.colorScheme = \\"light\\"")
   goto_url(target); wait_for_load()
   capture_screenshot("screenshots/<env>/<folder-name>/light/#<N>-<brief-desc>.png", max_dim=1800)
   '

   # — Dark —（複用同一 tab，daemon 保持狀態）
   browser-harness -c '
   target = "http://localhost:<port>/目標路徑"
   js("localStorage.setItem(\\"nuxt-color-mode\\", \\"dark\\"); document.documentElement.classList.remove(\\"light\\"); document.documentElement.classList.add(\\"dark\\"); document.documentElement.style.colorScheme = \\"dark\\"")
   goto_url(target); wait_for_load()
   capture_screenshot("screenshots/<env>/<folder-name>/dark/#<N>-<brief-desc>.png", max_dim=1800)
   '
   ```

4. **讀取截圖** — 用 Read tool 查看截圖，記錄觀察（雙模式時兩張都看）
5. **互動驗證**（如需要）：

   ```bash
   # screenshot 看到目標座標 (x, y) 後直接 click，跳過 state→index→click 三步
   browser-harness -c '
   click_at_xy(<x>, <y>)
   wait_for_load()
   capture_screenshot("screenshots/<env>/<folder-name>/<mode>/#<N>-<desc>-after.png", max_dim=1800)
   '
   ```

   **重要**：`click_at_xy` 接 CSS 像素，截圖檔是 device pixels（2× 螢幕會 ×2）。讀截圖時務必用 `js("window.devicePixelRatio")` 換算座標。

## 平行 / 隔離 session

Spectra `/spectra-apply` 等情境需要多個 screenshot-review subagent 並行時，每個 subagent 透過 `BU_NAME` 隔離 daemon：

```bash
BU_NAME=change-A browser-harness -c 'new_tab("...");  capture_screenshot("...")'
BU_NAME=change-B browser-harness -c 'new_tab("...");  capture_screenshot("...")'
```

預設 `BU_NAME=default`，多 subagent 不指定會搶同一個 daemon。

## Playwright CLI 用法（響應式 / 跨瀏覽器 / 多分頁）

當 browser-harness 不夠用時，寫 Playwright script 臨時跑或沉澱到 `tests/e2e/`：

```bash
# 一次跑完三個 viewport
npx playwright test tests/e2e/screenshots/<topic>.spec.ts \\
  --project=desktop --project=tablet --project=mobile
```

Script 骨架（`tests/e2e/screenshots/<topic>.spec.ts`）：

```typescript
import { test, expect } from '@playwright/test'

const BREAKPOINTS = [
  { name: 'desktop', width: 1440, height: 900 },
  { name: 'tablet', width: 768, height: 1024 },
  { name: 'mobile', width: 375, height: 812 },
]

for (const bp of BREAKPOINTS) {
  test(`<topic> @ ${bp.name}`, async ({ page }) => {
    await page.setViewportSize({ width: bp.width, height: bp.height })
    await page.goto('http://localhost:3000/auth/_dev-login?redirect=/target')
    await page.waitForSelector('text=目標文字')
    await page.screenshot({
      path: `screenshots/local/<folder>/${bp.name}-<desc>.png`,
      fullPage: true,
    })
  })
}
```

跨瀏覽器：在 `playwright.config.ts` 的 `projects` 加 `{ name: 'webkit', use: devices['Desktop Safari'] }`，然後 `--project=webkit`。
多分頁：`const p2 = await context.newPage()`。

若專案尚無 `playwright.config.ts`，先 `pnpm create playwright` 建立（選 `tests/e2e` 目錄）。

## Dev-login Route 模板（optional）

若 Chrome 對該專案沒登入過、且有 CI / 隔離 session 需求，可建議主 session 建立：

```typescript
// server/routes/auth/_dev-login.get.ts
export default defineEventHandler(async (event) => {
  if (!import.meta.dev) throw createError({ status: 404 })
  const query = getQuery(event)
  // ... set session
  return sendRedirect(event, (query.redirect as string) || '/')
})
```

註：browser-harness 預設情境下使用者只要在 Chrome 登入過一次，後續 agent 截圖都會繼承該 session — dev-login route 不再是 hard requirement。

## 產出報告

在 `screenshots/<env>/<folder-name>/review.md` 寫入：

```markdown
# 截圖報告

> Change: `<change-name>` （或 topic: `<topic>`）
> 日期：YYYY-MM-DD
> Color mode：light + dark / light only / dark only

## 截圖結果

### #1 <描述>

- 狀態：✅ 通過 / ⚠️ 需確認 / ❌ 有問題
- 截圖（light）：`screenshots/<env>/<folder-name>/light/#1-desc.png`
- 截圖（dark）：`screenshots/<env>/<folder-name>/dark/#1-desc.png`
- 觀察：（實際看到的畫面描述，分別註明 light/dark 差異）

...

## 摘要

- 通過：N 項
- 需確認：N 項
- 有問題：N 項

## Seed 變動（若 Emptiness Preflight 觸發過）

- Seed 檔：`<path>`
- 新增 row 數：N
- 跑的命令：`<command>`
- 對應頁面：`<URL>`（preflight 命中前 → 補後）
```

> 指定單一 mode 時，截圖路徑不帶 `light/` / `dark/` 子目錄，報告只列一行截圖。
> Emptiness Preflight 沒觸發 → 不需 Seed 變動 section；若有觸發但兜底走「停下回報主 session」（fixtures 在 tasks 但未跑 / staging 待授權 / 找不到 seed 機制），用「Preflight 觸發但未補 mock」section 取代，列原因。

## 回傳給主 session

回傳時 **MUST** 包含：

1. 摘要表格（通過/需確認/有問題 各幾項）
2. 每個「需確認」或「有問題」項目的截圖路徑 + 問題描述
3. 報告檔路徑

主 session 會將這些結果展示給使用者確認。

## 清理

browser-harness daemon 設計上常駐（保持後續呼叫快），**不需要**手動關閉。完成後：

- dev server 是你啟動的 → `kill <pid>` 停止
- dev server 是原本在跑的 → **不要停止**
- browser-harness daemon → 不動，下次截圖直接複用

## Guardrails

- **NEVER** 對非 UI 項目強行截圖
- **NEVER** patch auth middleware — Chrome 沒登入過就走 dev-login route 或請使用者登入
- **NEVER** 從截圖讀使用者帳密填寫登入表單 — 撞登入頁立刻停下回報
- **NEVER** 在沒 `page_info()` 驗證 host 的情況下截圖 — 真實 Chrome 可能切換過 tab
- **NEVER** 在 emptiness preflight 命中後硬拍交付（見「拍前 Emptiness Preflight」+「空資料解決流程」）
- **NEVER** 改 component 加 fallback 假資料來填空 UI — 治標不治本，破壞真實 review
- **NEVER** 在 dev 用 ad-hoc UI / API 補資料而不寫進 seed 檔 — 不持久化
- **NEVER** 在 staging 未授權前寫資料 — 必須先回主 session 詢問
- **ALWAYS** 讀取截圖後再判斷狀態，不要未看先判
- **ALWAYS** 保留截圖檔案
- **ALWAYS** `capture_screenshot(..., max_dim=1800)` 避免超過 LLM 圖片邊長上限
- 截圖失敗時記錄失敗原因，不要跳過
- Dev server 500 → Nitro 快取問題，重啟 dev server；仍有問題刪 `.nuxt/` 後重啟
- Tab 變 stale（chrome:// / about:blank）→ 在 `-c` block 開頭 `ensure_real_tab()` 救回
"""
