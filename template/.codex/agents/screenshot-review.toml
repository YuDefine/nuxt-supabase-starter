## 前置條件（自動處理）

### 1. 找到 dev server

```bash
ps aux | grep nuxt | grep "$(basename "$PWD")" | grep -v grep
```

- 有找到 → 從 process 取得 port（無 `--port` 則預設 3000）
- 沒找到 → 自動啟動：

```bash
for port in 3000 3001 3002 3003 3004; do
  lsof -iTCP:$port -sTCP:LISTEN -P >/dev/null 2>&1 || { echo $port; break; }
done
pnpm dev --port <port>
# 等待就緒（最多 60 秒）
for i in $(seq 1 30); do
  curl -s -o /dev/null -w "%{http_code}" http://localhost:<port>/ 2>/dev/null | grep -qE '200|302' && break
  sleep 2
done
```

### 2. 登入處理（多數情況不需要 dev-login route）

`browser-harness` 連的是使用者已經開好的 Chrome，繼承所有 cookie / session。**多數情況直接打目標 URL 就會帶著登入狀態**。

判斷流程：

| 情境 | 做法 |
| --- | --- |
| 使用者 Chrome 對 `localhost:<port>` 已登入 | 直接 `new_tab(URL)`，不需 dev-login |
| Chrome 沒登入過、且專案有 `server/routes/auth/_dev-login.get.ts` | 走 `new_tab("http://localhost:<port>/auth/_dev-login?redirect=/...")` 取得 session |
| Chrome 沒登入過、且專案有 `server/routes/auth/__test-login.get.ts` | 走 `new_tab("http://localhost:<port>/auth/__test-login?email=test@test.local&role=admin&redirect=/...")` |
| 撞到登入頁（page_info 顯示 redirect 到 `/auth/login` 等） | **MUST** 停下來告訴主 session「需要使用者先在 Chrome 完成登入」，**NEVER** 從截圖讀帳密填寫 |

判斷「是否撞到登入頁」：

```bash
browser-harness -c '
info = page_info()
print(info["url"])
print(info["title"])
'
```

URL 含 `/auth/login` / `/login` / `/signin` 或 title 含「登入」/「Sign in」即視為撞牆。

### 3. Color Mode 處理

主 session 可能指定 `colorMode: light`、`colorMode: dark`、或不指定。

| 指定               | 行為                                              |
| ------------------ | ------------------------------------------------- |
| `colorMode: light` | 只拍 light，截圖直接存在語義目錄下                |
| `colorMode: dark`  | 只拍 dark，截圖直接存在語義目錄下                 |
| **未指定（預設）** | **兩種都拍**，分別存到 `light/` 和 `dark/` 子目錄 |

切換 color mode（在同一個 `-c` 區塊內做完，省一次 daemon round-trip）：

```bash
browser-harness -c '
js("localStorage.setItem(\\"nuxt-color-mode\\", \\"light\\"); document.documentElement.classList.remove(\\"dark\\"); document.documentElement.classList.add(\\"light\\"); document.documentElement.style.colorScheme = \\"light\\"")
goto_url(URL)            # 同一 tab reload，確保主題完整套用
wait_for_load()
'
```

`dark` 對稱替換即可。

