## 嚴重程度定義

- 🔴 **Critical**: 安全漏洞、資料洩漏風險、會導致系統崩潰
- 🟠 **Major**: 邏輯錯誤、效能問題、不符合架構規範
- 🟡 **Minor**: 程式碼風格、可讀性、最佳實踐
- 🔵 **Info**: 建議改進、非必要優化

